version: "2"
run:
  go: "1.26"
linters:
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - dogsled
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - funlen
    - goconst
    - godot
    - gosec
    - makezero
    - misspell
    - mnd
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - tagliatelle
    - testpackage
    - tparallel
    - unconvert
    - unparam
    - usetesting
    - wastedassign
    - whitespace
  settings:
    funlen:
      lines: 100
      statements: 50
    nestif:
      min-complexity: 8
    nlreturn:
      block-size: 12
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    revive:
      rules:
        - name: var-naming
          disabled: false
    staticcheck:
      checks:
        - -S1016
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - unparam
        path: _test.go
      - linters:
          - goconst
        path: (.+)_test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
