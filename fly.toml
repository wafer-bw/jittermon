# fly.toml app configuration file generated for jittermon on 2026-03-22T12:08:47-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jittermon'
primary_region = 'yyz'
kill_signal = 'SIGINT'
kill_timeout = '1m0s'

[build]
  dockerfile = 'Dockerfile'

[env]
  JITTERMON_ID = 'flyio-peer'
  JITTERMON_PTP_INTERVAL = '1s'
  JITTERMON_PTP_LISTEN_ADDR = ':8080'
  JITTERMON_LOG_LEVEL = 'INFO'

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 8080

    [services.ports.http_options]
      h2_backend = true

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
