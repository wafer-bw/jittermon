edition = "2023";

package poll;

import "google/protobuf/duration.proto";

option go_package = "github.com/wafer-bw/jittermon/internal/sampler/latency/peer/internal/pollpb";

message PollResponse {
    // The identity of the responding peer.
    string id = 1;

    // The jitter observed by the responding peer on incoming requests.
    google.protobuf.Duration jitter = 2;
}
