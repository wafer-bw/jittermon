services:

  jittermon:
    image: jittermon:latest
    networks:
      - jittermon-network
    ports:
      - "8082:8082"
    environment:
      - JITTERMON_LOG_LEVEL=DEBUG
      - JITTERMON_LATENCY_INTERVAL=1s
      - JITTERMON_LATENCY_SEND_ADDRS=8.8.8.8:53
      - JITTERMON_P2P_LATENCY_INTERVAL=1s
      - JITTERMON_P2P_LATENCY_LISTEN_ADDR=:8080
      - JITTERMON_P2P_LATENCY_SEND_ADDRS=peer:8081
      - JITTERMON_METRICS_ADDR=:8082

  peer:
    image: jittermon:latest
    networks:
      - jittermon-network
    environment:
      - JITTERMON_LOG_LEVEL=DEBUG
      - JITTERMON_P2P_LATENCY_INTERVAL=1s
      - JITTERMON_P2P_LATENCY_LISTEN_ADDR=:8081
      - JITTERMON_P2P_LATENCY_SEND_ADDRS=jittermon:8080

  prometheus:
    image: prom/prometheus:latest
    networks:
      - jittermon-network
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command: --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    networks:
      - jittermon-network
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=demo
      - GF_SECURITY_ADMIN_PASSWORD=demo

networks:
  jittermon-network:
    driver: bridge
