version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/wafer-bw/jittermon/internal/gen/go
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: internal/gen/go
    opt:
      - paths=source_relative
      - default_api_level=API_OPAQUE
  - remote: buf.build/grpc/go:v1.6.1
    out: internal/gen/go
    opt: paths=source_relative
inputs:
  - directory: internal/proto
